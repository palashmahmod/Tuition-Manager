<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>টিউশন ম্যানেজার - ড্যাশবোর্ড</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            direction: ltr;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #333;
        }
        .form-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        button {
            padding: 10px 15px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #218838;
        }
        .batch-list {
            list-style: none;
            padding: 0;
        }
        .batch-item {
            background: #e9ecef;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
        }
        .batch-item a {
            text-decoration: none;
            color: #007bff;
            flex-grow: 1;
        }
        .delete-btn {
            background-color: #dc3545;
            padding: 5px 10px;
            font-size: 14px;
        }
        .delete-btn:hover {
            background-color: #c82333;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>আমার প্রাইভেট ব্যাচসমূহ</h2>
    
    <div class="form-group">
        <input type="text" id="batchNameInput" placeholder="নতুন ব্যাচের নাম লিখুন (যেমন: Class 9)">
        <button id="addBatchBtn">ব্যাচ তৈরি করুন</button>
    </div>

    <ul class="batch-list" id="batchList">
        </ul>
</div>

<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>

<script>
  // আপনার ফায়ারবেস কনফিগারেশন
  const firebaseConfig = {
    apiKey: "AIzaSyAquGKYXLOF5ZbHuu5GzenXRcVF_KKm5ag",
    authDomain: "tuition-manager-101c2.firebaseapp.com",
    databaseURL: "https://tuition-manager-101c2-default-rtdb.firebaseio.com",
    projectId: "tuition-manager-101c2",
    storageBucket: "tuition-manager-101c2.firebasestorage.app",
    messagingSenderId: "532051589045",
    appId: "1:532051589045:web:a7670048df0f5657ea8bfc",
    measurementId: "G-3BXWLMX1G6"
  };

  // ফায়ারবেস ইনিশিয়ালাইজ (compat সংস্করণ)
  firebase.initializeApp(firebaseConfig);
  const database = firebase.database(); // রিয়েলটাইম ডাটাবেজ ভেরিয়েবল

  const batchNameInput = document.getElementById('batchNameInput');
  const addBatchBtn = document.getElementById('addBatchBtn');
  const batchList = document.getElementById('batchList');

  // ১. ডাটাবেজ থেকে ব্যাচ লিস্ট লোড করা
  function loadBatches() {
    batchList.innerHTML = "লোড হচ্ছে...";
    
    database.ref("batches").on("value", (snapshot) => {
        batchList.innerHTML = "";
        if(!snapshot.exists()){
            batchList.innerHTML = "কোনো ব্যাচ তৈরি করা হয়নি।";
            return;
        }

        snapshot.forEach((childSnapshot) => {
            const batchId = childSnapshot.key;
            const batchData = childSnapshot.val();

            const li = document.createElement('li');
            li.className = 'batch-item';
            li.innerHTML = `
                <a href="batch.html?id=${batchId}&name=${encodeURIComponent(batchData.name)}">${batchData.name}</a>
                <button class="delete-btn" onclick="deleteBatch('${batchId}')">ডিলিট</button>
            `;
            batchList.appendChild(li);
        });
    });
  }

  // ২. নতুন ব্যাচ যোগ করা
  addBatchBtn.addEventListener('click', () => {
    const batchName = batchNameInput.value.trim();
    if (batchName === "") {
      alert("দয়া করে ব্যাচের একটি নাম দিন!");
      return;
    }

    // ডাটাবেজে পুশ (Push) করা হচ্ছে
    database.ref("batches").push({
        name: batchName,
        createdAt: new Date().toISOString()
    }).then(() => {
        batchNameInput.value = ""; 
        alert("ব্যাচটি সফলভাবে তৈরি হয়েছে!");
    }).catch((error) => {
        console.error("Error: ", error);
        alert("সমস্যা হয়েছে: " + error.message);
    });
  });

  // ৩. ব্যাচ ডিলিট করার ফাংশন
  window.deleteBatch = function(id) {
      if(confirm("আপনি কি নিশ্চিতভাবে এই ব্যাচটি ডিলিট করতে চান?")) {
          database.ref("batches/" + id).remove().then(() => {
              alert("ব্যাচটি ডিলিট হয়েছে।");
          });
      }
  }

  // পেজ লোড হওয়ামাত্রই রান হবে
  loadBatches();
</script>
</body>
</html>
