<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>হাজিরা রেজিস্টার</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            direction: ltr;
        }
        .container {
            max-width: 850px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h2, h3 { text-align: center; color: #333; }
        .back-btn {
            background-color: #6c757d; color: white; padding: 8px 12px;
            text-decoration: none; border-radius: 4px; display: inline-block; margin-bottom: 20px;
        }
        .date-picker-box {
            background: #e9ecef; padding: 15px; border-radius: 6px;
            display: flex; gap: 15px; justify-content: center; align-items: center; margin-bottom: 20px;
        }
        input[type="date"], select { padding: 10px; border-radius: 4px; border: 1px solid #ccc; font-size: 16px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #dee2e6; padding: 10px; text-align: center; }
        th { background-color: #f1f3f5; }
        .radio-group { display: flex; gap: 10px; justify-content: center; }
        .btn-submit {
            display: block; width: 100%; padding: 12px; background-color: #28a745;
            color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; margin-top: 20px;
        }
        .btn-submit:hover { background-color: #218838; }
        .stats { font-weight: bold; color: #007bff; }
    </style>
</head>
<body>
<div class="container">

    <a href="index.html" id="backLink" class="back-btn">← মূল ড্যাশবোর্ড</a>
    <h2 id="batchTitle">ব্যাচের নাম...</h2>
    <h3>প্রতিদিনের হাজিরা ও মাসিক রিপোর্ট</h3>

    <div class="date-picker-box">
        <label for="attDate"><b>তারিখ নির্বাচন করুন:</b></label>
        <input type="date" id="attDate">
        <span id="dayName" style="font-weight: bold; color: #555;">(বার)</span>
    </div>

    <table>
        <thead>
            <tr>
                <th>রোল</th>
                <th>স্টুডেন্টের নাম</th>
                <th>আজকের হাজিরা</th>
                <th>এই মাসের মোট কার্যদিবস</th>
                <th>এই মাসের মোট উপস্থিতি</th>
            </tr>
        </thead>
        <tbody id="attendanceTableBody">
            </tbody>
    </table>
    <button id="saveAttendanceBtn" class="btn-submit">আজকের হাজিরা সংরক্ষণ করুন</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAquGKYXLOF5ZbHuu5GzenXRcVF_KKm5ag",
    authDomain: "tuition-manager-101c2.firebaseapp.com",
    databaseURL: "https://tuition-manager-101c2-default-rtdb.firebaseio.com",
    projectId: "tuition-manager-101c2",
    storageBucket: "tuition-manager-101c2.firebasestorage.app",
    messagingSenderId: "532051589045",
    appId: "1:532051589045:web:a7670048df0f5657ea8bfc",
    measurementId: "G-3BXWLMX1G6"
  };

  // ফায়ারবেস ইনিশিয়ালাইজেশন
  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();

  // URL থেকে ব্যাচের তথ্য নেওয়া
  const urlParams = new URLSearchParams(window.location.search);
  const batchId = urlParams.get('batchId');
  const batchName = urlParams.get('batchName');

  document.getElementById('batchTitle').innerText = "ব্যাচ: " + batchName;
  document.getElementById('backLink').href = `batch.html?id=${batchId}&name=${encodeURIComponent(batchName)}`;

  const attDateInput = document.getElementById('attDate');
  const dayNameSpan = document.getElementById('dayName');
  const attendanceTableBody = document.getElementById('attendanceTableBody');
  const saveAttendanceBtn = document.getElementById('saveAttendanceBtn');

  // আজকের তারিখ ডিফল্ট সেট করা
  const today = new Date();
  const year = today.getFullYear();
  const month = String(today.getMonth() + 1).padStart(2, '0');
  const day = String(today.getDate()).padStart(2, '0');
  attDateInput.value = `${year}-${month}-${day}`;

  // বাংলায় বার প্রদর্শন করার ফাংশন
  function updateDayName(dateString) {
      const days = ['রবিবার', 'সোমবার', 'মঙ্গলবার', 'বুধবার', 'বৃহস্পতিবার', 'শুক্রবার', 'শনিবার'];
      const d = new Date(dateString);
      dayNameSpan.innerText = `(${days[d.getDay()]})`;
  }

  updateDayName(attDateInput.value);

  // তারিখ পরিবর্তন ইভেন্ট
  attDateInput.addEventListener('change', () => {
      updateDayName(attDateInput.value);
      loadAttendanceSheets();
  });

  // স্টুডেন্ট লিস্ট এবং রিপোর্ট লোড করার মেইন ফাংশন
  function loadAttendanceSheets() {
    attendanceTableBody.innerHTML = "<tr><td colspan='5'>লোড হচ্ছে...</td></tr>";
    
    const selectedDate = attDateInput.value; // YYYY-MM-DD
    const selectedMonth = selectedDate.substring(0, 7); // YYYY-MM

    // ১. স্টুডেন্টদের তালিকা ও উপস্থিতির রেকর্ড রিয়েলটাইম রিড করা
    database.ref(`batches/${batchId}`).once("value", (snapshot) => {
        attendanceTableBody.innerHTML = "";
        
        if (!snapshot.hasChild("students")) {
            attendanceTableBody.innerHTML = "<tr><td colspan='5'>এই ব্যাচে কোনো স্টুডেন্ট নেই!</td></tr>";
            return;
        }

        const studentsData = snapshot.child("students").val();
        const attendanceData = snapshot.child("attendance").val() || {};

        let todayAttendance = attendanceData[selectedDate] || {};
        let monthlyStats = {};

        // ২. এই মাসের মোট কার্যদিবস ও মোট উপস্থিতির রিপোর্ট তৈরি
        for (const attDate in attendanceData) {
            if (attDate.startsWith(selectedMonth)) {
                const dayRecord = attendanceData[attDate];
                for (const sId in dayRecord) {
                    if (!monthlyStats[sId]) {
                        monthlyStats[sId] = { totalDays: 0, presentDays: 0 };
                    }
                    monthlyStats[sId].totalDays += 1;
                    if (dayRecord[sId] === "Present") {
                        monthlyStats[sId].presentDays += 1;
                    }
                }
            }
        }

        // ৩. টেবিল ভিউ তৈরি করা
        for (const sId in studentsData) {
            const s = studentsData[sId];
            const stats = monthlyStats[sId] || { totalDays: 0, presentDays: 0 };
            const currentStatus = todayAttendance[sId] || "Present";

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${s.roll}</td>
                <td><b>${s.name}</b></td>
                <td>
                    <div class="radio-group">
                        <label><input type="radio" name="status_${sId}" value="Present" ${currentStatus === "Present" ? "checked" : ""}> উপস্থিত</label>
                        <label><input type="radio" name="status_${sId}" value="Absent" ${currentStatus === "Absent" ? "checked" : ""}> অনুপস্থিত</label>
                    </div>
                </td>
                <td class="stats">${stats.totalDays} দিন</td>
                <td class="stats" style="color: #28a745;">${stats.presentDays} day</td>
            `;
            attendanceTableBody.appendChild(tr);
        }
    });
  }

  // ৪. ডাটাবেজে হাজিরা সংরক্ষণ
  saveAttendanceBtn.addEventListener('click', () => {
      const selectedDate = attDateInput.value;
      
      database.ref(`batches/${batchId}/students`).once("value", (snapshot) => {
          if(!snapshot.exists()) return;

          let attendanceData = {};
          snapshot.forEach((childSnapshot) => {
              const sId = childSnapshot.key;
              const radioInput = document.querySelector(`input[name="status_${sId}"]:checked`);
              attendanceData[sId] = radioInput ? radioInput.value : "Present";
          });

          database.ref(`batches/${batchId}/attendance/${selectedDate}`).set(attendanceData).then(() => {
              alert("আজকের হাজিরা সফলভাবে ডাটাবেজে সংরক্ষিত হয়েছে!");
              loadAttendanceSheets(); // স্ক্রিন রিফ্রেশ করে নতুন ক্যালকুলেশন দেখানো
          }).catch((error) => {
              alert("ত্রুটি: " + error.message);
          });
      });
  });

  // পেজ ওপেন হওয়ামাত্রই রান হবে
  loadAttendanceSheets();
</script>
</body>
</html>
