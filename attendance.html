<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>হাজিরা রেজিস্টার</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            min-height: 100vh;
            padding: 15px;
            color: #333;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: #ffffff;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }
        .back-btn {
            background-color: #6c757d;
            color: white;
            padding: 8px 14px;
            text-decoration: none;
            border-radius: 8px;
            display: inline-block;
            margin-bottom: 20px;
            font-size: 13px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .back-btn:hover { background-color: #5a6268; }
        
        h2 {
            text-align: center;
            color: #2c3e50;
            font-size: 20px;
            margin-bottom: 5px;
            font-weight: 700;
        }
        h3 {
            text-align: center;
            color: #718096;
            font-size: 14px;
            margin-bottom: 20px;
            font-weight: 500;
        }
        
        .date-picker-box {
            background: #f8fafc;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #edf2f7;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
        }
        @media (min-width: 480px) {
            .date-picker-box {
                flex-direction: row;
                gap: 15px;
            }
        }
        .date-picker-box label {
            font-size: 14px;
            color: #475569;
        }
        input[type="date"] {
            padding: 10px 15px;
            border-radius: 8px;
            border: 0.8px solid #cbd5e1;
            font-size: 15px;
            outline: none;
            background: #ffffff;
            transition: border-color 0.2s;
        }
        input[type="date"]:focus {
            border-color: #3498db;
        }
        
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            background: #ffffff;
            margin-top: 15px;
            -webkit-overflow-scrolling: touch;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 450px;
        }
        th, td {
            padding: 10px 10px;
            font-size: 13px;
            text-align: center;
            border-bottom: 1px solid #edf2f7;
        }
        th {
            background-color: #f1f5f9;
            color: #475569;
            font-weight: 600;
        }
        tr:last-child td { border-bottom: none; }
        
        /* বন্ধ বা নিষ্ক্রিয় শিক্ষার্থীর সারির জন্য নতুন স্টাইল */
        tr.student-inactive {
            background-color: #ffe5e5 !important;
            color: #b30000;
        }
        
        .radio-group {
            display: flex;
            gap: 8px;
            justify-content: center;
        }
        .radio-group label {
            display: flex;
            align-items: center;
            gap: 5px;
            background: #f1f5f9;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            user-select: none;
            transition: all 0.2s;
            border: 1px solid #e2e8f0;
        }
        .radio-group input[type="radio"] {
            transform: scale(1.1);
            cursor: pointer;
        }
        
        .radio-group label:has(input[value="Present"]:checked) {
            background: #d4edda;
            color: #155724;
            border-color: #c3e6cb;
        }
        .radio-group label:has(input[value="Absent"]:checked) {
            background: #f8d7da;
            color: #721c24;
            border-color: #f5c6cb;
        }
        
        /* রেডিও বাটন disabled থাকলে স্টাইল */
        .radio-group label:has(input[disabled]) {
            opacity: 0.6;
            cursor: not-allowed;
            background: #e2e8f0;
            color: #4a5568;
        }
        
        .stats {
            font-weight: 600;
            color: #3498db;
        }
        
        .btn-submit {
            display: block;
            width: 100%;
            padding: 14px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 25px;
            box-shadow: 0 4px 6px rgba(46, 204, 113, 0.2);
            transition: background 0.2s, transform 0.1s;
        }
        .btn-submit:active {
            transform: scale(0.99);
        }
        .btn-submit:hover {
            background-color: #27ae60;
        }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" id="backLink" class="back-btn">← ব্যাচ ম্যানেজমেন্ট</a>
    <h2 id="batchTitle">ব্যাচের নাম...</h2>
    <h3>প্রতিদিনের হাজিরা ও মাসিক রিপোর্ট</h3>
    
    <div class="date-picker-box">
        <label for="attDate"><b>তারিখ নির্বাচন করুন:</b></label>
        <div>
            <input type="date" id="attDate">
            <span id="dayName" style="font-weight: 600; color: #4a5568; margin-left: 5px;">(বার)</span>
        </div>
    </div>
    
    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th style="width: 10%;">রোল</th>
                    <th style="width: 25%;">স্টুডেন্টের নাম</th>
                    <th style="width: 35%;">আজকের হাজিরা</th>
                    <th style="width: 15%;">চলতি মাসের কার্যদিবস</th>
                    <th style="width: 15%;">চলতি মাসের উপস্থিতি</th>
                </tr>
            </thead>
            <tbody id="attendanceTableBody">
                </tbody>
        </table>
    </div>
    
    <button id="saveAttendanceBtn" class="btn-submit">💾 আজকের হাজিরা সংরক্ষণ করুন</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAquGKYXLOF5ZbHuu5GzenXRcVF_KKm5ag",
    authDomain: "tuition-manager-101c2.firebaseapp.com",
    databaseURL: "https://tuition-manager-101c2-default-rtdb.firebaseio.com",
    projectId: "tuition-manager-101c2",
    storageBucket: "tuition-manager-101c2.firebasestorage.app",
    messagingSenderId: "532051589045",
    appId: "1:532051589045:web:a7670048df0f5657ea8bfc",
    measurementId: "G-3BXWLMX1G6"
  };
  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();
  const urlParams = new URLSearchParams(window.location.search);
  const batchId = urlParams.get('batchId');
  const batchName = urlParams.get('batchName');
  
  document.getElementById('batchTitle').innerText = "ব্যাচ: " + batchName;
  document.getElementById('backLink').href = `batch.html?id=${batchId}&name=${encodeURIComponent(batchName)}`;
  
  const attDateInput = document.getElementById('attDate');
  const dayNameSpan = document.getElementById('dayName');
  const attendanceTableBody = document.getElementById('attendanceTableBody');
  const saveAttendanceBtn = document.getElementById('saveAttendanceBtn');
  
  const today = new Date();
  const year = today.getFullYear();
  const month = String(today.getMonth() + 1).padStart(2, '0');
  const day = String(today.getDate()).padStart(2, '0');
  attDateInput.value = `${year}-${month}-${day}`;
  
  function updateDayName(dateString) {
      const days = ['রবিবার', 'সোমবার', 'মঙ্গলবার', 'বুধবার', 'বৃহস্পতিবার', 'শুক্রবার', 'শনিবার'];
      const d = new Date(dateString);
      dayNameSpan.innerText = `(${days[d.getDay()]})`;
  }
  
  updateDayName(attDateInput.value);
  attDateInput.addEventListener('change', () => {
      updateDayName(attDateInput.value);
      loadAttendanceSheets();
  });
  
  function loadAttendanceSheets() {
    attendanceTableBody.innerHTML = "<tr><td colspan='5'>লোড হচ্ছে...</td></tr>";
    
    const selectedDate = attDateInput.value;
    const selectedMonth = selectedDate.substring(0, 7);
    
    database.ref(`batches/${batchId}`).once("value", (snapshot) => {
        attendanceTableBody.innerHTML = "";
        
        if (!snapshot.hasChild("students")) {
            attendanceTableBody.innerHTML = "<tr><td colspan='5'>এই ব্যাচে কোনো স্টুডেন্ট নেই!</td></tr>";
            return;
        }
        
        const studentsData = snapshot.child("students").val();
        const attendanceData = snapshot.child("attendance").val() || {};
        let todayAttendance = attendanceData[selectedDate] || {};
        
        let monthlyStats = {};
        for (const attDate in attendanceData) {
            if (attDate.startsWith(selectedMonth)) {
                const dayRecord = attendanceData[attDate];
                for (const sId in dayRecord) {
                    if (!monthlyStats[sId]) {
                        monthlyStats[sId] = { totalDays: 0, presentDays: 0 };
                    }
                    monthlyStats[sId].totalDays += 1;
                    if (dayRecord[sId] === "Present") {
                        monthlyStats[sId].presentDays += 1;
                    }
                }
            }
        }
        
        for (const sId in studentsData) {
            const s = studentsData[sId];
            const stats = monthlyStats[sId] || { totalDays: 0, presentDays: 0 };
            
            // স্ট্যাটাস লজিক এবং ডেট কম্পারিসন চেক
            const isInactive = s.status === "inactive";
            const inactiveDate = s.inactiveDate || "";
            
            // নির্বাচিত তারিখটি যদি বন্ধ করার তারিখ বা তার পরের হয়, তবেই এটি কার্যকর হবে
            const shouldDisable = isInactive && (selectedDate >= inactiveDate);
            
            // যদি আজকে বন্ধ থাকে, তবে ডিফল্ট Absent বা পূর্বের সংরক্ষিত ডেটা দেখাবে
            const currentStatus = todayAttendance[sId] || (shouldDisable ? "Absent" : "Present");
            
            const tr = document.createElement('tr');
            if (shouldDisable) {
                tr.className = "student-inactive";
            }
            
            const nameDisplay = shouldDisable 
                ? `<b>${s.name}</b> <br><small style="color:#dc3545; font-size:11px;">(পড়া বন্ধ)</small>` 
                : `<b>${s.name}</b>`;
                
            tr.innerHTML = `
                <td>${s.roll}</td>
                <td>${nameDisplay}</td>
                <td>
                    <div class="radio-group">
                        <label><input type="radio" name="status_${sId}" value="Present" ${currentStatus === "Present" ? "checked" : ""} ${shouldDisable ? "disabled" : ""} onchange="handleRadioChange(this)"> উপস্থিত</label>
                        <label><input type="radio" name="status_${sId}" value="Absent" ${currentStatus === "Absent" ? "checked" : ""} ${shouldDisable ? "disabled" : ""} onchange="handleRadioChange(this)"> অনুপস্থিত</label>
                    </div>
                </td>
                <td class="stats">${stats.totalDays} দিন</td>
                <td class="stats" style="color: #2ecc71;">${stats.presentDays} দিন</td>
            `;
            attendanceTableBody.appendChild(tr);
        }
    });
  }
  
  window.handleRadioChange = function(radio) {
      const group = radio.closest('.radio-group');
      group.querySelectorAll('label').forEach(label => {
          const input = label.querySelector('input');
          if(input.checked) {
              if(input.value === "Present") {
                  label.style.background = "#d4edda";
                  label.style.color = "#155724";
                  label.style.borderColor = "#c3e6cb";
              } else {
                  label.style.background = "#f8d7da";
                  label.style.color = "#721c24";
                  label.style.borderColor = "#f5c6cb";
              }
          } else {
              label.style.background = "#f1f5f9";
              label.style.color = "#333";
              label.style.borderColor = "#e2e8f0";
          }
      });
  }
  
  saveAttendanceBtn.addEventListener('click', () => {
      const selectedDate = attDateInput.value;
      
      database.ref(`batches/${batchId}`).once("value", (snapshot) => {
          if(!snapshot.exists()) return;
          
          const studentsData = snapshot.child("students").val();
          let attendanceData = {};
          
          for (const sId in studentsData) {
              const s = studentsData[sId];
              const isInactive = s.status === "inactive";
              const inactiveDate = s.inactiveDate || "";
              const shouldDisable = isInactive && (selectedDate >= inactiveDate);
              
              const radioInput = document.querySelector(`input[name="status_${sId}"]:checked`);
              
              if (shouldDisable) {
                  // পড়া বন্ধ থাকলে স্বয়ংক্রিয়ভাবে ডাটাবেজে Absent হিসেবে সংরক্ষিত হবে
                  attendanceData[sId] = "Absent";
              } else {
                  attendanceData[sId] = radioInput ? radioInput.value : "Present";
              }
          }
          
          database.ref(`batches/${batchId}/attendance/${selectedDate}`).set(attendanceData).then(() => {
              alert("আজকের হাজিরা সফলভাবে ডাটাবেজে সংরক্ষিত হয়েছে!");
              loadAttendanceSheets();
          }).catch((error) => {
              alert("ত্রুটি: " + error.message);
          });
      });
  });
  
  loadAttendanceSheets();
</script>
</body>
</html>
