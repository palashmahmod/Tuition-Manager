<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ব্যাচ ম্যানেজমেন্ট</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            min-height: 100vh;
            padding: 15px;
            color: #333;
        }
        .container {
            max-width: 650px;
            margin: 0 auto;
            background: #ffffff;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }
        .back-btn {
            background-color: #6c757d;
            color: white;
            padding: 8px 14px;
            text-decoration: none;
            border-radius: 8px;
            display: inline-block;
            margin-bottom: 20px;
            font-size: 13px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .back-btn:hover { background-color: #5a6268; }
        
        h2 {
            text-align: center;
            color: #2c3e50;
            font-size: 20px;
            margin-bottom: 15px;
            font-weight: 700;
        }
        h3 {
            color: #2c3e50;
            font-size: 16px;
            margin-bottom: 12px;
            font-weight: 600;
        }
        
        .nav-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 25px;
        }
        .nav-buttons button {
            padding: 12px 8px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            color: white;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .btn-attendance { background: #3498db; }
        .btn-attendance:hover { background: #2980b9; }
        .btn-payment { background: #17a2b8; }
        .btn-payment:hover { background: #138496; }
        
        .form-box {
            background: #f8fafc;
            padding: 15px;
            border: 1px solid #edf2f7;
            border-radius: 12px;
            margin-bottom: 25px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 12px;
        }
        @media (max-width: 480px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .full-width-mobile {
                grid-column: span 1 !important;
            }
        }
        input, select {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            background: #ffffff;
        }
        input:focus, select:focus { border-color: #3498db; }
        .full-width { grid-column: span 2; }
        
        button.btn-submit {
            width: 100%;
            padding: 12px;
            color: white;
            background: #2ecc71;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            box-shadow: 0 4px 6px rgba(46, 204, 113, 0.15);
        }
        button.btn-submit:hover { background: #27ae60; }
        
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            background: #ffffff;
            -webkit-overflow-scrolling: touch;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 550px;
        }
        th, td {
            padding: 10px 8px;
            font-size: 13px;
            text-align: center;
            border-bottom: 1px solid #edf2f7;
        }
        th {
            background-color: #f1f5f9;
            color: #475569;
            font-weight: 600;
        }
        tr:last-child td { border-bottom: none; }
        
        .action-btns button {
            padding: 5px 10px;
            font-size: 11px;
            font-weight: 600;
            margin: 2px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            color: white;
        }
        .btn-edit { background-color: #ffc107; color: #212529 !important; }
        .btn-edit:hover { background-color: #e0a800; }
        .btn-delete { background-color: #dc3545; }
        .btn-delete:hover { background-color: #c82333; }
        
        .btn-transfer { background-color: #3f51b5; }
        .btn-transfer:hover { background-color: #303f9f; }
        
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 15px;
        }
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .modal-content h3 { margin-bottom: 15px; text-align: center; }
        .modal-btns {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .modal-btns button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-confirm-transfer { background: #2ecc71; color: white; }
        .btn-cancel-transfer { background: #e2e8f0; color: #4a5568; }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-btn">← মূল ড্যাশবোর্ড</a>
    <h2 id="batchTitle">ব্যাচের নাম লোড হচ্ছে...</h2>
    
    <div class="nav-buttons">
        <button id="goToAttendanceBtn" class="btn-attendance">📅 দৈনিক হাজিরা</button>
        <button id="goToPaymentBtn" class="btn-payment">৳ মাসিক কালেকশন</button>
    </div>
    
    <div class="form-box">
        <h3 id="formTitle">নতুন স্টুডেন্ট যোগ করুন</h3>
        <input type="hidden" id="studentId"> 
        <div class="form-grid">
            <input type="text" id="stuName" placeholder="স্টুডেন্টের নাম" required>
            <input type="text" id="stuClass" placeholder="শ্রেণি" required>
            <input type="text" id="stuSection" placeholder="শাখা (Section)">
            <input type="number" id="stuRoll" placeholder="রোল নম্বর" required>
            <input type="date" id="stuJoinDate" class="full-width full-width-mobile" title="যোগদানের তারিখ" required>
        </div>
        <button id="saveStudentBtn" class="btn-submit">সংরক্ষণ করুন</button>
    </div>
    
    <h3>স্টুডেন্ট তালিকা (ডানে-বামে স্ক্রোল করুন)</h3>
    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>রোল</th>
                    <th>নাম</th>
                    <th>শ্রেণি (শাখা)</th>
                    <th>যোগদান</th>
                    <th>অ্যাকশন</th>
                </tr>
            </thead>
            <tbody id="studentTableBody"></tbody>
        </table>
    </div>
</div>

<div class="modal-overlay" id="transferModal">
    <div class="modal-content">
        <h3>স্টুডেন্ট স্থানান্তর করুন</h3>
        <p style="font-size:13px; color:#64748b; margin-bottom:10px; text-align:center;" id="transferStudentName"></p>
        <label for="targetBatchSelect" style="font-size:13px; font-weight:600; display:block; margin-bottom:5px;">নতুন ব্যাচ সিলেক্ট করুন:</label>
        <select id="targetBatchSelect">
            <option value="">লোডিং হচ্ছে...</option>
        </select>
        <div class="modal-btns">
            <button class="btn-confirm-transfer" id="confirmTransferBtn">স্থানান্তর কনফার্ম</button>
            <button class="btn-cancel-transfer" id="cancelTransferBtn">বাতিল</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAquGKYXLOF5ZbHuu5GzenXRcVF_KKm5ag",
    authDomain: "tuition-manager-101c2.firebaseapp.com",
    databaseURL: "https://tuition-manager-101c2-default-rtdb.firebaseio.com",
    projectId: "tuition-manager-101c2",
    storageBucket: "tuition-manager-101c2.firebasestorage.app",
    messagingSenderId: "532051589045",
    appId: "1:532051589045:web:a7670048df0f5657ea8bfc",
    measurementId: "G-3BXWLMX1G6"
  };
  
  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();
  const urlParams = new URLSearchParams(window.location.search);
  const batchId = urlParams.get('id');
  const batchName = urlParams.get('name');
  
  if(!batchId) {
      alert("কোনো ব্যাচ সিলেক্ট করা হয়নি!");
      window.location.href = "index.html";
  }
  
  document.getElementById('batchTitle').innerText = "ব্যাচ: " + batchName;
  document.getElementById('goToAttendanceBtn').addEventListener('click', () => {
      window.location.href = `attendance.html?batchId=${batchId}&batchName=${encodeURIComponent(batchName)}`;
  });
  document.getElementById('goToPaymentBtn').addEventListener('click', () => {
      window.location.href = `payment.html?batchId=${batchId}&batchName=${encodeURIComponent(batchName)}`;
  });
  
  const studentTableBody = document.getElementById('studentTableBody');
  const saveStudentBtn = document.getElementById('saveStudentBtn');
  const studentIdInput = document.getElementById('studentId');
  const formTitle = document.getElementById('formTitle');
  
  const stuName = document.getElementById('stuName');
  const stuClass = document.getElementById('stuClass');
  const stuSection = document.getElementById('stuSection');
  const stuRoll = document.getElementById('stuRoll');
  const stuJoinDate = document.getElementById('stuJoinDate');
  
  const transferModal = document.getElementById('transferModal');
  const targetBatchSelect = document.getElementById('targetBatchSelect');
  const confirmTransferBtn = document.getElementById('confirmTransferBtn');
  const cancelTransferBtn = document.getElementById('cancelTransferBtn');
  let currentTransferStudentId = '';
  
  function loadStudents() {
    studentTableBody.innerHTML = "<tr><td colspan='5'>লোড হচ্ছে...</td></tr>";
    database.ref(`batches/${batchId}/students`).on("value", (snapshot) => {
        studentTableBody.innerHTML = "";
        if(!snapshot.exists()){
            studentTableBody.innerHTML = "<tr><td colspan='5'>এই ব্যাচে কোনো স্টুডেন্ট নেই!</td></tr>";
            return;
        }
        snapshot.forEach((childSnapshot) => {
            const sId = childSnapshot.key;
            const s = childSnapshot.val();
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${s.roll}</td>
                <td><b>${s.name}</b></td>
                <td>${s.class} (${s.section || '-'})</td>
                <td>${s.joinDate}</td>
                <td class="action-btns">
                    <button class="btn-edit" onclick="editStudent('${sId}')">ইডিট</button>
                    <button class="btn-transfer" onclick="openTransferModal('${sId}', '${s.name}')">স্থানান্তর</button>
                    <button class="btn-delete" onclick="deleteStudent('${sId}')">ডিলিট</button>
                </td>
            `;
            studentTableBody.appendChild(tr);
        });
    });
  }
  
  saveStudentBtn.addEventListener('click', () => {
    const name = stuName.value.trim();
    const sClass = stuClass.value.trim();
    const section = stuSection.value.trim();
    const roll = stuRoll.value.trim();
    const joinDate = stuJoinDate.value;
    const id = studentIdInput.value;
    if(!name || !sClass || !roll || !joinDate) {
        alert("দয়া করে সবকটি ঘর পূরণ করুন!");
        return;
    }
    const studentData = { name, class: sClass, section, roll: parseInt(roll), joinDate };
    if(id === "") {
        database.ref(`batches/${batchId}/students`).push(studentData).then(() => {
            resetForm();
        });
    } else {
        database.ref(`batches/${batchId}/students/${id}`).set(studentData).then(() => {
            formTitle.innerText = "নতুন স্টুডেন্ট যোগ করুন";
            saveStudentBtn.innerText = "সংরক্ষণ করুন";
            studentIdInput.value = "";
            resetForm();
        });
    }
  });
  
  window.editStudent = function(sId) {
      database.ref(`batches/${batchId}/students/${sId}`).once("value", (snapshot) => {
          if(snapshot.exists()) {
              const s = snapshot.val();
              studentIdInput.value = sId;
              stuName.value = s.name;
              stuClass.value = s.class;
              stuSection.value = s.section;
              stuRoll.value = s.roll;
              stuJoinDate.value = s.joinDate;
              formTitle.innerText = "স্টুডেন্ট তথ্য সংশোধন";
              saveStudentBtn.innerText = "আপডেট করুন";
          }
      });
  }
  
  window.deleteStudent = function(sId) {
      if(confirm("আপনি কি নিশ্চিতভাবে এই স্টুডেন্টকে ডিলিট করতে চান?")) {
          database.ref(`batches/${batchId}/students/${sId}`).remove();
      }
  }
  
  window.openTransferModal = function(sId, sName) {
      currentTransferStudentId = sId;
      document.getElementById('transferStudentName').innerText = "স্টুডেন্ট: " + sName;
      targetBatchSelect.innerHTML = "<option value=''>ব্যাচ সিলেক্ট করুন</option>";
      
      database.ref("batches").once("value", (snapshot) => {
          if(snapshot.exists()) {
              snapshot.forEach((childSnapshot) => {
                  const bId = childSnapshot.key;
                  const bData = childSnapshot.val();
                  if(bId !== batchId) {
                      const option = document.createElement('option');
                      option.value = bId;
                      option.innerText = bData.name;
                      targetBatchSelect.appendChild(option);
                  }
              });
              transferModal.style.display = 'flex';
          } else {
              alert("স্থানান্তর করার মতো অন্য কোনো ব্যাচ পাওয়া যায়নি!");
          }
      });
  }
  
  cancelTransferBtn.addEventListener('click', () => {
      transferModal.style.display = 'none';
  });
  
  // ৩. ট্রান্সফার কনফার্মেশন লজিক (হাজিরা ও পেমেন্ট রেকর্ড সহ স্থানান্তর করার জন্য আপডেটেড লজিক)
  confirmTransferBtn.addEventListener('click', () => {
      const targetBatchId = targetBatchSelect.value;
      if(!targetBatchId) {
          alert("দয়া করে একটি টার্গেট ব্যাচ সিলেক্ট করুন!");
          return;
      }
      
      if(confirm("আপনি কি নিশ্চিতভাবে সমস্ত হাজিরা ও পেমেন্ট ডেটাসহ এই স্টুডেন্টকে স্থানান্তরিত করতে চান?")) {
          
          // সম্পূর্ণ পুরনো ব্যাচের ডেটা রিড করা হচ্ছে যেন হাজিরা ও পেমেন্ট খুঁজে পাওয়া যায়
          database.ref(`batches/${batchId}`).once("value", (snapshot) => {
              if(!snapshot.exists()) {
                  alert("ব্যাচের ডেটা খুঁজে পাওয়া যায়নি!");
                  return;
              }
              
              const batchData = snapshot.val();
              const studentData = batchData.students ? batchData.students[currentTransferStudentId] : null;
              
              if(!studentData) {
                  alert("স্টুডেন্ট প্রোফাইল ডেটা খুঁজে পাওয়া যায়নি!");
                  return;
              }
              
              let updates = {};
              
              // (ক) নতুন ব্যাচে ঠিক আগের স্টুডেন্ট আইডি (Key) বজায় রেখেই প্রোফাইল কপি করা
              updates[`batches/${targetBatchId}/students/${currentTransferStudentId}`] = studentData;
              
              // (খ) পুরনো ব্যাচের হাজিরা (Attendance) খুঁজে নতুন ব্যাচে পাথ তৈরি করা
              if (batchData.attendance) {
                  for (const dateKey in batchData.attendance) {
                      if (batchData.attendance[dateKey] && batchData.attendance[dateKey][currentTransferStudentId]) {
                          const attStatus = batchData.attendance[dateKey][currentTransferStudentId];
                          updates[`batches/${targetBatchId}/attendance/${dateKey}/${currentTransferStudentId}`] = attStatus;
                      }
                  }
              }
              
              // (গ) পুরনো ব্যাচের পেমেন্ট (Payments) খুঁজে নতুন ব্যাচে পাথ তৈরি করা
              if (batchData.payments) {
                  for (const paymentDocId in batchData.payments) {
                      if (paymentDocId.endsWith(`-${currentTransferStudentId}`)) {
                          const paymentRecord = batchData.payments[paymentDocId];
                          updates[`batches/${targetBatchId}/payments/${paymentDocId}`] = paymentRecord;
                      }
                  }
              }
              
              // নতুন ব্যাচে সমস্ত ডেটা একবারে রাইট (Write) করা
              database.ref().update(updates).then(() => {
                  
                  // নতুন ব্যাচে ডেটা কপি হয়ে যাওয়ার পর পুরনো ব্যাচ থেকে ডেটা ডিলিট করার পাথ তৈরি
                  let deleteUpdates = {};
                  deleteUpdates[`batches/${batchId}/students/${currentTransferStudentId}`] = null;
                  
                  // পুরনো ব্যাচের হাজিরা থেকে স্টুডেন্ট রিমুভ
                  if (batchData.attendance) {
                      for (const dateKey in batchData.attendance) {
                          if (batchData.attendance[dateKey] && batchData.attendance[dateKey][currentTransferStudentId]) {
                              deleteUpdates[`batches/${batchId}/attendance/${dateKey}/${currentTransferStudentId}`] = null;
                          }
                      }
                  }
                  
                  // পুরনো ব্যাচের পেমেন্ট থেকে স্টুডেন্ট রিমুভ
                  if (batchData.payments) {
                      for (const paymentDocId in batchData.payments) {
                          if (paymentDocId.endsWith(`-${currentTransferStudentId}`)) {
                              deleteUpdates[`batches/${batchId}/payments/${paymentDocId}`] = null;
                          }
                      }
                  }
                  
                  // পুরনো ব্যাচ থেকে সম্পূর্ণ ডেটা ডিলিট সম্পন্ন করা
                  database.ref().update(deleteUpdates).then(() => {
                      alert("স্টুডেন্টকে তার বিগত সকল হাজিরা ও পেমেন্টের তথ্যসহ সফলভাবে স্থানান্তর করা হয়েছে!");
                      transferModal.style.display = 'none';
                      location.reload(); // পেজ রিফ্রেশ করে আপডেট দেখার জন্য
                  });
                  
              }).catch((error) => {
                  console.error("Transfer Error: ", error);
                  alert("স্থানান্তরে সমস্যা হয়েছে: " + error.message);
              });
          });
      }
  });
  
  function resetForm() {
      stuName.value = ""; stuClass.value = ""; stuSection.value = ""; stuRoll.value = ""; stuJoinDate.value = "";
  }
  
  loadStudents();
</script>
</body>
</html>
